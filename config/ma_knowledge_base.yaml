# =============================================================================
# DATA QUALITY NOTES
# =============================================================================
data_quality:
  cpsc_suppression:
    description: "CPSC files suppress enrollment < 11 for HIPAA"
    impact: "State/county totals ~1-3% lower than national"
    workaround: "Use enrollment by plan file for accurate totals"
    
  group_type_inference:
    description: "Individual vs Group derived from EGHP field or plan ID heuristic"
    reliability: "High confidence for explicit EGHP, medium for plan ID heuristic"
    note: "Plan IDs 800+ are typically employer group"
    
  snp_type_coverage:
    description: "D-SNP/C-SNP/I-SNP detail only in SNP Comprehensive Report"
    reliability: "~95% of SNP enrollment has specific type identified"
    note: "Some SNPs show as 'SNP-Unknown' if not in SNP report"
    
  crosswalk_completeness:
    description: "Contract crosswalks from 2006-2026"
    reliability: "Very high for recent years, may miss some pre-2010 changes"
    
  risk_score_timing:
    description: "Risk scores are annual, linked to December enrollment of that year"
    note: "2024 risk scores use December 2024 enrollment for linkage"
